<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#eab308" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="860" height="320" fill="#0f172a" rx="12"/>

  <!-- ── TITLE ROW ── -->
  <text x="430" y="26" fill="#475569" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">HOW SEMANTIC MATCHING WORKS</text>

  <!-- ── STEP 1: Resume text in ── -->
  <rect x="20" y="44" width="180" height="56" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="110" y="66" fill="#a5b4fc" font-size="12" font-weight="700" text-anchor="middle">Resume summary</text>
  <text x="110" y="84" fill="#64748b" font-size="10" text-anchor="middle">"senior React engineer</text>
  <text x="110" y="96" fill="#64748b" font-size="10" text-anchor="middle">6 years TypeScript..."</text>

  <!-- arrow → MiniLM -->
  <line x1="200" y1="72" x2="228" y2="72" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MiniLM box -->
  <rect x="230" y="44" width="160" height="56" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="310" y="66" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">MiniLM L6 v2</text>
  <text x="310" y="82" fill="#64748b" font-size="10" text-anchor="middle">sentence transformer</text>
  <text x="310" y="96" fill="#64748b" font-size="10" text-anchor="middle">runs locally · no API</text>

  <!-- arrow → embedding -->
  <line x1="390" y1="72" x2="418" y2="72" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Resume vector -->
  <rect x="420" y="44" width="200" height="56" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="520" y="64" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">Resume vector</text>
  <text x="520" y="80" fill="#475569" font-size="9" text-anchor="middle">[0.23, -0.87, 0.41, 0.09,</text>
  <text x="520" y="94" fill="#475569" font-size="9" text-anchor="middle"> 0.31, ... 384 numbers]</text>

  <!-- label: Float32Array[384] -->
  <text x="520" y="116" fill="#334155" font-size="10" text-anchor="middle">Float32Array · 384 dimensions</text>

  <!-- ── DIVIDER ── -->
  <line x1="20" y1="132" x2="840" y2="132" stroke="#1e293b" stroke-width="1.5"/>
  <text x="430" y="148" fill="#334155" font-size="10" text-anchor="middle" letter-spacing="1">SAME PROCESS FOR EACH JOB DESCRIPTION  →  FAISS SEARCHES ALL AT ONCE</text>

  <!-- ── JOB VECTORS + SCORES ── -->

  <!-- Job 1 — high match -->
  <rect x="20" y="162" width="230" height="48" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="182" fill="#4ade80" font-size="11" font-weight="700">"Sr. Frontend Engineer"</text>
  <text x="80" y="198" fill="#64748b" font-size="10">"React TypeScript Node.js..."</text>
  <text x="232" y="190" fill="#22c55e" font-size="10" text-anchor="end">vector →</text>

  <!-- score badge job 1 -->
  <rect x="660" y="162" width="90" height="48" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="705" y="183" fill="#4ade80" font-size="18" font-weight="700" text-anchor="middle">91%</text>
  <text x="705" y="200" fill="#4ade80" font-size="10" text-anchor="middle">strong match</text>

  <!-- arrow job 1 -->
  <line x1="252" y1="186" x2="476" y2="186" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- faiss result arrow -->
  <line x1="560" y1="186" x2="658" y2="186" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Job 2 — partial match -->
  <rect x="20" y="222" width="230" height="48" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="1.5"/>
  <text x="80" y="242" fill="#facc15" font-size="11" font-weight="700">"Full Stack Developer"</text>
  <text x="80" y="258" fill="#64748b" font-size="10">"JavaScript Python Django..."</text>
  <text x="232" y="250" fill="#eab308" font-size="10" text-anchor="end">vector →</text>

  <!-- score badge job 2 -->
  <rect x="660" y="222" width="90" height="48" rx="8" fill="#422006" stroke="#eab308" stroke-width="1.5"/>
  <text x="705" y="243" fill="#facc15" font-size="18" font-weight="700" text-anchor="middle">63%</text>
  <text x="705" y="260" fill="#facc15" font-size="10" text-anchor="middle">partial match</text>

  <!-- arrow job 2 -->
  <line x1="252" y1="246" x2="476" y2="246" stroke="#eab308" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <line x1="560" y1="246" x2="658" y2="246" stroke="#eab308" stroke-width="1.5" marker-end="url(#arr-yellow)"/>

  <!-- Job 3 — weak match -->
  <rect x="20" y="282" width="230" height="30" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="296" fill="#f87171" font-size="11" font-weight="700">"Java Backend Engineer"</text>
  <text x="232" y="300" fill="#ef4444" font-size="10" text-anchor="end">vector →</text>

  <!-- score badge job 3 -->
  <rect x="660" y="282" width="90" height="30" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="705" y="302" fill="#f87171" font-size="14" font-weight="700" text-anchor="middle">28%  weak</text>

  <!-- arrow job 3 -->
  <line x1="252" y1="297" x2="476" y2="297" stroke="#ef4444" stroke-width="1" marker-end="url(#arr-red)"/>
  <line x1="560" y1="297" x2="658" y2="297" stroke="#ef4444" stroke-width="1" marker-end="url(#arr-red)"/>

  <!-- ── FAISS box (centre) ── -->
  <rect x="478" y="162" width="180" height="150" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="568" y="188" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">FAISS</text>
  <text x="568" y="206" fill="#60a5fa" font-size="11" text-anchor="middle">IndexFlatIP</text>
  <line x1="498" y1="214" x2="638" y2="214" stroke="#1e3a5f" stroke-width="1"/>
  <text x="568" y="230" fill="#64748b" font-size="10" text-anchor="middle">inner product search</text>
  <text x="568" y="246" fill="#64748b" font-size="10" text-anchor="middle">= cosine similarity</text>
  <text x="568" y="264" fill="#64748b" font-size="10" text-anchor="middle">on normalised vectors</text>
  <text x="568" y="284" fill="#334155" font-size="10" text-anchor="middle">sub-millisecond</text>
  <text x="568" y="298" fill="#334155" font-size="10" text-anchor="middle">across all 20 jobs</text>

  <!-- resume vector → FAISS (vertical arrow down) -->
  <line x1="568" y1="100" x2="568" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- path from resume vector box right edge down to FAISS -->
  <path d="M 620 72 Q 660 72 660 130 Q 660 162 660 162" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="630" y1="160" x2="630" y2="162" stroke="none"/>

</svg>
