<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="860" height="200" fill="#0f172a" rx="12"/>

  <!-- Stage 1 — PDF Upload -->
  <rect x="16" y="24" width="148" height="152" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="16" y="24" width="148" height="28" rx="8" fill="#312e81"/>
  <rect x="16" y="40" width="148" height="12" rx="0" fill="#312e81"/>
  <text x="90" y="43" fill="#a5b4fc" font-size="11" font-weight="700" text-anchor="middle">① PDF Upload</text>
  <text x="90" y="74" fill="#64748b" font-size="10" text-anchor="middle">File object</text>
  <text x="90" y="92" fill="#94a3b8" font-size="10" text-anchor="middle">resume.pdf</text>
  <text x="90" y="110" fill="#64748b" font-size="10" text-anchor="middle">↓ multer saves</text>
  <text x="90" y="126" fill="#64748b" font-size="10" text-anchor="middle">↓ pdf-parse reads</text>
  <text x="90" y="144" fill="#64748b" font-size="10" text-anchor="middle">↓ file deleted</text>
  <text x="90" y="162" fill="#475569" font-size="10" text-anchor="middle">uploads/ (temp)</text>

  <!-- arrow 1→2 -->
  <line x1="164" y1="100" x2="190" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 2 — Raw Text -->
  <rect x="192" y="24" width="148" height="152" rx="8" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="192" y="24" width="148" height="28" rx="8" fill="#134e4a"/>
  <rect x="192" y="40" width="148" height="12" rx="0" fill="#134e4a"/>
  <text x="266" y="43" fill="#5eead4" font-size="11" font-weight="700" text-anchor="middle">② Raw Text</text>
  <text x="266" y="72" fill="#64748b" font-size="10" text-anchor="middle">{ text: string }</text>
  <text x="266" y="92" fill="#475569" font-size="9" text-anchor="middle">"Jane Smith</text>
  <text x="266" y="106" fill="#475569" font-size="9" text-anchor="middle">Senior Engineer</text>
  <text x="266" y="120" fill="#475569" font-size="9" text-anchor="middle">React · Node.js</text>
  <text x="266" y="134" fill="#475569" font-size="9" text-anchor="middle">6 years..."</text>
  <text x="266" y="158" fill="#64748b" font-size="10" text-anchor="middle">→ Gemini API</text>

  <!-- arrow 2→3 -->
  <line x1="340" y1="100" x2="366" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 3 — Structured Profile -->
  <rect x="368" y="24" width="148" height="152" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <rect x="368" y="24" width="148" height="28" rx="8" fill="#431407"/>
  <rect x="368" y="40" width="148" height="12" rx="0" fill="#431407"/>
  <text x="442" y="43" fill="#fb923c" font-size="11" font-weight="700" text-anchor="middle">③ Profile JSON</text>
  <text x="442" y="68" fill="#475569" font-size="9" text-anchor="middle">skills: ["React",</text>
  <text x="442" y="82" fill="#475569" font-size="9" text-anchor="middle">  "Node.js", ...]</text>
  <text x="442" y="96" fill="#475569" font-size="9" text-anchor="middle">experience_years: 6</text>
  <text x="442" y="110" fill="#475569" font-size="9" text-anchor="middle">job_titles: [...]</text>
  <text x="442" y="124" fill="#475569" font-size="9" text-anchor="middle">summary: "..."</text>
  <text x="442" y="152" fill="#64748b" font-size="10" text-anchor="middle">→ Adzuna query</text>
  <text x="442" y="166" fill="#64748b" font-size="10" text-anchor="middle">top-3 skills only</text>

  <!-- arrow 3→4 -->
  <line x1="516" y1="100" x2="542" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 4 — Job Listings -->
  <rect x="544" y="24" width="148" height="152" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="544" y="24" width="148" height="28" rx="8" fill="#1e3a5f"/>
  <rect x="544" y="40" width="148" height="12" rx="0" fill="#1e3a5f"/>
  <text x="618" y="43" fill="#60a5fa" font-size="11" font-weight="700" text-anchor="middle">④ Job Listings</text>
  <text x="618" y="68" fill="#475569" font-size="9" text-anchor="middle">title: "Sr. Frontend"</text>
  <text x="618" y="82" fill="#475569" font-size="9" text-anchor="middle">company: "Stripe"</text>
  <text x="618" y="96" fill="#475569" font-size="9" text-anchor="middle">location: "NYC"</text>
  <text x="618" y="110" fill="#475569" font-size="9" text-anchor="middle">salary: "$150-180k"</text>
  <text x="618" y="124" fill="#475569" font-size="9" text-anchor="middle">url: "adzuna..."</text>
  <text x="618" y="152" fill="#64748b" font-size="10" text-anchor="middle">20 results</text>
  <text x="618" y="166" fill="#64748b" font-size="10" text-anchor="middle">→ FAISS index</text>

  <!-- arrow 4→5 -->
  <line x1="692" y1="100" x2="718" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 5 — Ranked Matches -->
  <rect x="720" y="24" width="124" height="152" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="720" y="24" width="124" height="28" rx="8" fill="#14532d"/>
  <rect x="720" y="40" width="124" height="12" rx="0" fill="#14532d"/>
  <text x="782" y="43" fill="#4ade80" font-size="11" font-weight="700" text-anchor="middle">⑤ Matches</text>
  <text x="782" y="68" fill="#475569" font-size="9" text-anchor="middle">score: 0.91 ✦</text>
  <text x="782" y="82" fill="#475569" font-size="9" text-anchor="middle">score: 0.84</text>
  <text x="782" y="96" fill="#475569" font-size="9" text-anchor="middle">score: 0.79</text>
  <text x="782" y="110" fill="#475569" font-size="9" text-anchor="middle">score: 0.71</text>
  <text x="782" y="124" fill="#64748b" font-size="9" text-anchor="middle">  ·  ·  ·</text>
  <text x="782" y="150" fill="#64748b" font-size="10" text-anchor="middle">top 10</text>
  <text x="782" y="164" fill="#64748b" font-size="10" text-anchor="middle">sorted desc</text>

</svg>
